# =============================================================================
# PR Preview — Deploys a preview to a Firebase Hosting preview channel
# Runs only on Pull Requests targeting main/master
# =============================================================================

name: PR Preview Deploy

on:
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'food_redistribution_app/lib/**'
      - 'food_redistribution_app/pubspec.*'

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal permissions for PR preview deployments
permissions:
  contents: read
  pull-requests: write  # Required for FirebaseExtended/action-hosting-deploy to comment on PR

env:
  WORKING_DIR: ./food_redistribution_app

jobs:
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WORKING_DIR }}/.dart_tool
            ${{ env.WORKING_DIR }}/.packages
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Create CI firebase_options.dart
        run: |
          cat <<'EOF' > lib/firebase_options.dart
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: 'ci-dummy-key',
                appId: '1:000000000000:android:0000000000000000',
                messagingSenderId: '000000000000',
                projectId: 'ci-dummy-project',
              );
            }
          }
          EOF

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting preview channel
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase hosting:channel:deploy pr-${{ github.event.pull_request.number }} --expires 7d --token "$FIREBASE_TOKEN" --project food-redistribution-plat-86785
