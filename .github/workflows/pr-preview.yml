# =============================================================================
# PR Preview — Deploys a preview to a Firebase Hosting preview channel
# Runs only on Pull Requests targeting main/master
# =============================================================================

name: PR Preview Deploy

on:
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'food_redistribution_app/lib/**'
      - 'food_redistribution_app/pubspec.*'

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FLUTTER_VERSION: '3.27.0'
  WORKING_DIR: ./food_redistribution_app

jobs:
  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WORKING_DIR }}/.dart_tool
            ${{ env.WORKING_DIR }}/.packages
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Create CI firebase_options.dart
        run: |
          cat <<'EOF' > lib/firebase_options.dart
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: 'ci-dummy-key',
                appId: '1:000000000000:android:0000000000000000',
                messagingSenderId: '000000000000',
                projectId: 'ci-dummy-project',
              );
            }
          }
          EOF

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Deploy to Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: food-redistribution-plat-86785
          entryPoint: ${{ env.WORKING_DIR }}
          # This creates a temporary preview URL for each PR
