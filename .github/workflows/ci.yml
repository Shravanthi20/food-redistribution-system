# =============================================================================
# CI Pipeline — Continuous Integration
# Runs on every push/PR to main/master
# Steps: Lint → Analyze → Test → Coverage → Build Verification
# =============================================================================

name: CI — Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Cancel any in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — read-only access to repository contents
permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  WORKING_DIR: ./food_redistribution_app

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Code Quality — Formatting + Static Analysis
  # ─────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WORKING_DIR }}/.dart_tool
            ${{ env.WORKING_DIR }}/.packages
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Create CI firebase_options.dart
        run: |
          cat <<'EOF' > lib/firebase_options.dart
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: 'ci-dummy-key',
                appId: '1:000000000000:android:0000000000000000',
                messagingSenderId: '000000000000',
                projectId: 'ci-dummy-project',
              );
            }
          }
          EOF

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --no-fatal-warnings

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Unit & Widget Tests + Coverage
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: code-quality
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WORKING_DIR }}/.dart_tool
            ${{ env.WORKING_DIR }}/.packages
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Create CI firebase_options.dart
        run: |
          cat <<'EOF' > lib/firebase_options.dart
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: 'ci-dummy-key',
                appId: '1:000000000000:android:0000000000000000',
                messagingSenderId: '000000000000',
                projectId: 'ci-dummy-project',
              );
            }
          }
          EOF

      - name: Run unit tests
        run: flutter test test/unit/ --reporter expanded

      - name: Run widget tests
        run: flutter test test/widget/ --reporter expanded

      - name: Run tracking/integration tests
        run: flutter test test/tracking/ --reporter expanded

      - name: Run all tests with coverage
        run: flutter test --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.WORKING_DIR }}/coverage/lcov.info
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Build Verification (Android APK)
  # ─────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.WORKING_DIR }}/.dart_tool
            ${{ env.WORKING_DIR }}/.packages
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Create CI firebase_options.dart
        run: |
          cat <<'EOF' > lib/firebase_options.dart
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: 'ci-dummy-key',
                appId: '1:000000000000:android:0000000000000000',
                messagingSenderId: '000000000000',
                projectId: 'ci-dummy-project',
              );
            }
          }
          EOF

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
